name: Deploy PostgreSQL Infra

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (pre or pro)'
        required: true
        type: choice
        options:
          - pre
          - pro

jobs:
  deploy-postgresql:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Load infra config
        shell: powershell
        run: |
          $env_file = "$env:PFMREPO\finance\resources\env_config\.env.${{ inputs.environment }}"
          Get-Content $env_file | ForEach-Object {
            if ($_ -match '^([^#][^=]*)=(.*)$') {
              echo "$($matches[1])=$($matches[2])" >> $env:GITHUB_ENV
            }
          }
          $dbUri = [System.Uri]$env:DB_URL
          $dbName = $dbUri.AbsolutePath.TrimStart('/')
          if (-not $dbName) {
            Write-Error "DB_URL must include the database name: $env:DB_URL"
            exit 1
          }
          echo "DB_NAME=$dbName" >> $env:GITHUB_ENV
          echo "COMPOSE_PROJECT_NAME=pfm-finance-${{ inputs.environment }}" >> $env:GITHUB_ENV
          echo "NETWORK_NAME=pfm-finance-${{ inputs.environment }}-net" >> $env:GITHUB_ENV

      - name: Deploy PostgreSQL only
        shell: powershell
        run: |
          docker-compose -p $env:COMPOSE_PROJECT_NAME -f finance/resources/docker-compose-infra.yaml up -d postgres

      - name: Wait for PostgreSQL healthcheck
        shell: powershell
        run: |
          $containerName = "pfm-finance-postgres-$env:ENVIRONMENT"
          $maxAttempts = 30
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            $status = docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' $containerName 2>$null
            if ($status -eq 'healthy') {
              Write-Host "PostgreSQL is healthy"
              exit 0
            }
            Start-Sleep -Seconds 2
          }
          Write-Error "PostgreSQL did not become healthy in time"
          docker logs $containerName
          exit 1
