name: Build Finance App

on:
  push:
    branches:
      - main
      - 'fix/*'
    paths:
      - 'finance/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Load runner config
        shell: powershell
        run: |
          echo "RELEASES_DIR=$env:PFMREPO\finance\releases" >> $env:GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from commit
        id: version
        shell: powershell
        run: |
          $VERSION = & git describe --tags --always --abbrev=7 2>$null
          if (-not $VERSION) {
            $VERSION = & git rev-parse --short HEAD
          }
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build with Maven
        shell: powershell
        run: .\finance\mvnw.cmd clean install -pl finance-app,finance-acceptance-test -am -f finance/pom.xml

      - name: Create releases directory and copy JAR
        shell: powershell
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $JAR_SOURCE = Get-ChildItem "finance/finance-app/target/finance-app-*.jar" | Where-Object { $_.Name -notlike "*-sources.jar" } | Select-Object -First 1
          if (-not $JAR_SOURCE) { Write-Error "No JAR found in target directory"; exit 1 }
          New-Item -ItemType Directory -Force -Path "$env:RELEASES_DIR\$VERSION" | Out-Null
          Copy-Item $JAR_SOURCE.FullName "$env:RELEASES_DIR\$VERSION\finance-app-$VERSION.jar"
          Get-ChildItem "$env:RELEASES_DIR\$VERSION\"

      - name: Verify JAR created
        shell: powershell
        run: |
          $JAR_PATH = "$env:RELEASES_DIR\${{ steps.version.outputs.version }}\finance-app-${{ steps.version.outputs.version }}.jar"
          if (-not (Test-Path $JAR_PATH)) {
            Write-Error "JAR not found at $JAR_PATH"
            exit 1
          }
          Write-Host "JAR ready at: $JAR_PATH"

  deploy:
    needs: build
    uses: ./.github/workflows/deploy.yml
    with:
      version: ${{ needs.build.outputs.version }}
      environment: pre
