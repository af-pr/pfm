name: Deploy Finance App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version to deploy'
        required: true
        type: string
      environment:
        description: 'Environment (pre or pro)'
        required: true
        type: choice
        options:
          - pre
          - pro
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      environment:
        required: true
        type: string

jobs:
  migrate-db:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'


      - name: Load .env variables into environment
        shell: powershell
        run: |
          $env_file = "$env:PFMREPO\finance\resources\env_config\.env.${{ inputs.environment }}"
          $technicalVars = @('ENVIRONMENT','DB_URL','DB_NAME','DB_PORT','APP_PORT','NETWORK_NAME')
          Get-Content $env_file | ForEach-Object {
            if ($_ -match '^([^#][^=]*)=(.*)$') {
              Set-Item -Path "env:$($matches[1])" -Value $matches[2]
              if ($technicalVars -contains $matches[1]) {
                echo "$($matches[1])=$($matches[2])" >> $env:GITHUB_ENV
              }
            }
          }

      - name: Extract DB_URL and set derived variables
        shell: powershell
        run: |
          $regex = 'jdbc:postgresql://([^:/]+):(\d+)/(\w+)' # host, port, dbname
          if ($env:DB_URL -match $regex) {
            $dbHost = $matches[1]
            $dbPort = $matches[2]
          } else {
            Write-Error "DB_URL must match pattern jdbc:postgresql://host:port/dbname."
            exit 1
          }
          # DB_NAME siempre viene del .env, nunca de la URL
          echo "DB_HOST=$dbHost" >> $env:GITHUB_ENV
          echo "DB_PORT_FROM_URL=$dbPort" >> $env:GITHUB_ENV
          echo "APP_DB_URL=jdbc:postgresql://postgres:5432/$env:DB_NAME" >> $env:GITHUB_ENV
          echo "COMPOSE_PROJECT_NAME=pfm-finance-${{ inputs.environment }}" >> $env:GITHUB_ENV
          echo "NETWORK_NAME=pfm-finance-${{ inputs.environment }}-net" >> $env:GITHUB_ENV
          echo "RELEASES_DIR=$env:PFMREPO\finance\releases" >> $env:GITHUB_ENV

      - name: Verify PostgreSQL container is running
        shell: powershell
        run: |
          $containerName = "pfm-finance-postgres-$env:ENVIRONMENT"
          $status = docker inspect --format='{{.State.Status}}' $containerName 2>$null
          if ($LASTEXITCODE -ne 0 -or $status -ne 'running') {
            Write-Error "PostgreSQL container '$containerName' is not running. Run the 'Deploy PostgreSQL Infra' workflow first."
            exit 1
          }

      - name: Verify artifact JAR exists
        shell: powershell
        run: |
          $JAR_PATH = "$env:RELEASES_DIR\${{ inputs.version }}\finance-app-${{ inputs.version }}.jar"
          if (-not (Test-Path $JAR_PATH)) {
            Write-Error "JAR not found at $JAR_PATH"
            exit 1
          }
          Write-Host "JAR found: $JAR_PATH"

      - name: Run Liquibase migration (one-off)
        shell: powershell
        run: |
          $env_file = "$env:PFMREPO\finance\resources\env_config\.env.${{ inputs.environment }}"
          Get-Content $env_file | ForEach-Object {
            if ($_ -match '^(DB_USERNAME|DB_PASSWORD)=(.*)$') {
              Set-Item -Path "Env:$($matches[1])" -Value $matches[2]
            }
          }
          $JAR_PATH = "$env:RELEASES_DIR\${{ inputs.version }}\finance-app-${{ inputs.version }}.jar"
          $migrationDbUrl = "jdbc:postgresql://$env:DB_HOST`:$env:DB_PORT_FROM_URL/$env:DB_NAME"
          $args = @(
            "-Dspring.main.web-application-type=none",
            "-Dspring.autoconfigure.exclude=org.springframework.boot.autoconfigure.web.servlet.ServletWebServerFactoryAutoConfiguration",
            "-jar", $JAR_PATH,
            "--DB_URL=$migrationDbUrl",
            "--DB_USERNAME=$env:DB_USERNAME",
            "--DB_PASSWORD=$env:DB_PASSWORD",
            "--APP_PORT=0"
          )
          $proc = Start-Process -FilePath "java" -ArgumentList $args -NoNewWindow -PassThru
          $finished = $proc.WaitForExit(180000)
          if (-not $finished) {
            Stop-Process -Id $proc.Id -Force
            Write-Error "Migration process timed out"
            exit 1
          }
          if ($proc.ExitCode -ne 0) {
            Write-Error "Migration failed with exit code $($proc.ExitCode)"
            exit $proc.ExitCode
          }
          Write-Host "Migration completed"

  deploy-app:
    runs-on: self-hosted
    needs: migrate-db

    steps:
      - uses: actions/checkout@v4

      - name: Load deploy config
        shell: powershell
        run: |
          $env_file = "$env:PFMREPO\finance\resources\env_config\.env.${{ inputs.environment }}"
          Get-Content $env_file | ForEach-Object {
            if ($_ -match '^([^#][^=]*)=(.*)$') {
              echo "$($matches[1])=$($matches[2])" >> $env:GITHUB_ENV
            }
          }
          # DB_NAME siempre viene del .env, nunca de la URL
          echo "APP_DB_URL=jdbc:postgresql://postgres:5432/$env:DB_NAME" >> $env:GITHUB_ENV
          echo "COMPOSE_PROJECT_NAME=pfm-finance-${{ inputs.environment }}" >> $env:GITHUB_ENV
          echo "NETWORK_NAME=pfm-finance-${{ inputs.environment }}-net" >> $env:GITHUB_ENV
          echo "RELEASES_DIR=$env:PFMREPO\finance\releases" >> $env:GITHUB_ENV

      - name: Build Docker image
        shell: powershell
        run: |
          $VERSION = "${{ inputs.version }}"
          $JAR_SOURCE = "$env:RELEASES_DIR\$VERSION\finance-app-$VERSION.jar"
          $JAR_DEST = "finance\finance-app\finance-app-$VERSION.jar"
          Copy-Item $JAR_SOURCE $JAR_DEST
          docker build -t "pfm-finance:$VERSION" `
            -f finance/finance-app/Dockerfile `
            --build-arg "JAR_FILE=finance/finance-app/finance-app-$VERSION.jar" `
            .
          Remove-Item $JAR_DEST -ErrorAction SilentlyContinue
          Write-Host "Docker image built: pfm-finance:$VERSION"

      - name: Deploy with docker-compose
        shell: powershell
        run: |
          $env:APP_VERSION = "${{ inputs.version }}"
          docker-compose -p $env:COMPOSE_PROJECT_NAME -f finance/resources/docker-compose-app.yaml up -d
          Start-Sleep -Seconds 5
          docker-compose -p $env:COMPOSE_PROJECT_NAME -f finance/resources/docker-compose-app.yaml logs finance-app

      - name: Clean up old images
        shell: powershell
        run: |
          $CURRENT_VERSION = "${{ inputs.version }}"
          Write-Host "Current version: $CURRENT_VERSION"
          $OLD_IMAGES = docker images pfm-finance --format "{{.Tag}}" | Where-Object { $_ -ne $CURRENT_VERSION }
          if ($OLD_IMAGES) {
            Write-Host "Removing old images: $OLD_IMAGES"
            foreach ($tag in $OLD_IMAGES) {
              docker rmi "pfm-finance:$tag" 2>$null
            }
          } else {
            Write-Host "No old images to remove"
          }
