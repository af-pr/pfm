services:
  postgres:
    image: postgres:16-alpine
    container_name: pfm-postgres
    environment:
      POSTGRES_DB: pfm_finance
      POSTGRES_USER: pfm
      POSTGRES_PASSWORD: pfm
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfm -d pfm_finance"]
      interval: 5s
      timeout: 5s
      retries: 5

  mountebank:
    image: bbyars/mountebank:2.9.1
    container_name: pfm-mountebank
    ports:
      - "2525:2525"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2525/ > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 5
